name: integr8

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: integr8
      POSTGRES_PASSWORD: integr8
      POSTGRES_DB: integr8
    ports:
      # Host port 5433 (not 5432) avoids colliding with Postgres.app or any other
      # local Postgres install. Container still listens on 5432 internally, so
      # the inter-container DATABASE_URL (postgres:5432) is unchanged.
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U integr8 -d integr8"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: api
    env_file: .env
    environment:
      DATABASE_URL: postgresql://integr8:integr8@postgres:5432/integr8?schema=public
      REDIS_URL: redis://redis:6379
      API_PORT: 3010
    ports:
      - "${API_PORT:-3010}:3010"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: worker
    env_file: .env
    environment:
      DATABASE_URL: postgresql://integr8:integr8@postgres:5432/integr8?schema=public
      REDIS_URL: redis://redis:6379
      MOCK_ERP_URL: http://mock-erp:3002
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mock-erp:
        condition: service_started

  mock-erp:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: mock-erp
    env_file: .env
    environment:
      DATABASE_URL: postgresql://integr8:integr8@postgres:5432/integr8?schema=public
      REDIS_URL: redis://redis:6379
      MOCK_ERP_PORT: 3002
    ports:
      - "${MOCK_ERP_PORT:-3002}:3002"
    depends_on:
      postgres:
        condition: service_healthy

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: dashboard
    env_file: .env
    environment:
      DATABASE_URL: postgresql://integr8:integr8@postgres:5432/integr8?schema=public
      REDIS_URL: redis://redis:6379
    ports:
      - "${DASHBOARD_PORT:-3003}:3003"

volumes:
  postgres-data:
